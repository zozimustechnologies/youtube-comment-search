<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Red rounded square background -->
  <rect width="128" height="128" rx="22" ry="22" fill="#FF0000"/>

  <!-- White magnifying glass circle -->
  <circle cx="54" cy="52" r="22" fill="none" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round"/>

  <!-- White magnifying glass handle -->
  <line x1="70" y1="68" x2="90" y2="88" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round"/>

  <!-- White horizontal lines (comment lines) inside magnifier -->
  <line x1="44" y1="47" x2="64" y2="47" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="44" y1="55" x2="60" y2="55" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
</svg>
