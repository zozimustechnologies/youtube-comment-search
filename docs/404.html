<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found · YouTube Comment Search</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/zozimustechnologies/youtube-comment-search/main/public/icons/icon.svg" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .error-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      position: relative;
    }
    .error-wrap::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 40%, rgba(224,0,0,0.10) 0%, transparent 65%);
      pointer-events: none;
    }
    .error-code {
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 900;
      color: var(--accent);
      line-height: 1;
      letter-spacing: -0.05em;
      opacity: 0.18;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -60%);
      user-select: none;
    }
    .error-content {
      position: relative;
      z-index: 1;
    }
    .error-icon {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      margin: 0 auto 24px;
      box-shadow: 0 8px 32px rgba(224,0,0,0.3);
    }
    .error-content h1 {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 800;
      color: var(--text-bright);
      margin-bottom: 12px;
    }
    .error-content p {
      font-size: 1rem;
      color: var(--text-muted);
      max-width: 420px;
      margin: 0 auto 32px;
      line-height: 1.6;
    }
    .error-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>

  <div class="error-wrap">
    <span class="error-code" aria-hidden="true">404</span>

    <div class="error-content">
      <img
        src="https://raw.githubusercontent.com/zozimustechnologies/youtube-comment-search/main/public/icons/icon.svg"
        alt="YouTube Comment Search logo"
        class="error-icon"
        width="72"
        height="72"
      />
      <h1>Page not found</h1>
      <p>The page you're looking for doesn't exist or may have been moved.</p>
      <div class="error-actions">
        <a href="index.html" class="btn btn-primary">Go to home</a>
        <a href="https://github.com/zozimustechnologies/youtube-comment-search/issues" class="btn btn-outline" target="_blank" rel="noopener">Report an issue</a>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
